<!DOCTYPE html>

<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Validar Identidad</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">

<div class="row justify-content-center">

    <div class="col-md-6">

        <div class="card shadow">

            <div class="card-header text-center">
                <h4>Ver Entrega del Vehículo</h4>
            </div>

            <div class="card-body">

                <p>
                    Para visualizar la información de entrega del vehículo
                    <strong>{{ placa }}</strong>,
                    ingrese el número de identificación registrado.
                </p>

                {% if error %}
                <div class="alert alert-danger">
                    {{ error }}
                </div>
                {% endif %}

                <form method="POST">
                    {% csrf_token %}

                    <div class="mb-3">
                        <label class="form-label">
                            Número de identificación
                        </label>

                        <input
                            type="number"
                            name="identificacion"
                            class="form-control"
                            required
                        >
                    </div>

                    <button type="submit" class="btn btn-primary">
                        Consultar
                    </button>

                    <a href="{% url 'lista_clientes' %}"
                       class="btn btn-secondary">
                        Volver
                    </a>

                </form>

            </div>

        </div>

    </div>

</div>


</div>

</body>
</html>
