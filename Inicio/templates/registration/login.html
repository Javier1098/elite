{% load static %}

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Iniciar Sesión | Elite S.A.S</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <link rel="stylesheet" href="{% static 'css/login.css' %}">
</head>

<script>
function mostrarPassword() {
    let campo = document.getElementById("password");

    if (campo.type === "password") {
        campo.type = "text";
    } else {
        campo.type = "password";
    }
}
</script>

<body>
    

<!-- Imagen lateral -->

        <!-- Formulario -->
        <div class="col-lg-5 d-flex align-items-center justify-content-center">

            <div class="card shadow-lg border-0 login-card">

                <div class="card-body p-5">

                    <div class="text-center mb-4">

                        <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTve3oNI4azSLtjJDZ1Ljq4VPMrNOECsg7yFg&s"
                             class="logo mb-3"
                             alt="Logo">

                        <h2 class="fw-bold">Bienvenido</h2>
                        <p class="text-muted">
                            Ingrese sus credenciales para acceder
                        </p>

                    </div>

                    <!-- Mensajes Django -->
                    {% if messages %}
                        {% for message in messages %}
                            <div class="alert alert-{{ message.tags }}">
                                {{ message }}
                            </div>
                        {% endfor %}
                    {% endif %}

                    <form method="POST">
                        {% csrf_token %}

                        <div class="mb-3">
                            <label class="form-label">
                                Usuario
                            </label>

                            <div class="input-group">
                                <span class="input-group-text">
                                    <i class="bi bi-person-fill"></i>
                                </span>

                                <input
                                    type="text"
                                    name="username"
                                    class="form-control"
                                    placeholder="Ingrese usuario"
                                    required>
                            </div>
                        </div>

                       <div class="mb-4">
                    <label class="form-label">
                        Contraseña
                    </label>

                    <div class="input-group">
                        <span class="input-group-text">
                            <i class="bi bi-lock-fill"></i>
                        </span>

                        <input
                            type="password"
                            name="password"
                            id="password"
                            class="form-control"
                            placeholder="Ingrese contraseña"
                            required>

                        <button class="btn btn-outline-secondary"
                                type="button"
                                onclick="mostrarPassword()">
                            <i class="bi bi-eye-fill"></i>
                        </button>
                    </div>
                </div>

                <div class="form-check mb-3">
                    <input class="form-check-input"
                        type="checkbox"
                        id="remember">

                    <label class="form-check-label"
                        for="remember">
                        Recordarme
                    </label>
                </div>

                <div class="text-center mt-3">
                    <a href="#" class="text-decoration-none">
                        ¿Olvidó su contraseña?
                    </a>
                </div>

                        <button  class="btn btn-primary w-100 py-2">
                            <i class="bi bi-box-arrow-in-right"></i>
                            Iniciar Sesión
                        </button>

                    </form>

                </div>

                <div class="card-footer text-center bg-light">
                    <small class="text-muted">
                        © 2026 Elite S.A.S - Todos los derechos reservados
                    </small>
                </div>

            </div>

        </div>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
