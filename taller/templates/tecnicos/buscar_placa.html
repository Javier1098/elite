{% extends 'vehiculos/base.html' %}

{% block content %}

<h2>Buscar vehículo</h2>

<form method="GET">

    <input
        type="text"
        name="placa"
        placeholder="Ingrese placa"
        class="form-control"
        value="{{ placa }}"
    >

    <br>

    <button class="btn btn-primary">
        Buscar
    </button>

</form>

<hr>

<table class="table">

    <thead>
        <tr>
            <th>Placa</th>
            <th>Tarea</th>
            <th>Estado</th>
        </tr>
    </thead>

    <tbody>

    {% for tarea in tareas %}

        <tr>
            <td>{{ tarea.vehiculo.placa }}</td>
            <td>{{ tarea.descripcion }}</td>
            <td>{{ tarea.estado }}</td>
        </tr>

    {% empty %}

        <tr>
            <td colspan="3">
                No existen registros
            </td>
        </tr>

    {% endfor %}

    </tbody>

</table>

{% endblock %}
